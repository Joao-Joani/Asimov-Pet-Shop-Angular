<div class="w-full h-screen overflow-hidden flex justify-center relative">

  <app-template></app-template>

  <div class="relative w-full max-w-screen h-screen font-['Poppins'] flex flex-col">
    
    <header class="shrink-0 relative z-50 flex flex-col md:flex-row items-center justify-between w-full px-6 py-6 md:px-16 lg:px-[140px]">
      <app-header></app-header>
      <div class="flex items-center gap-4 mt-6 md:mt-0 pointer-events-auto">
        <app-user></app-user>
      </div>
    </header>

    <div class="relative z-10 flex-1 flex flex-col lg:flex-row items-start px-6 md:px-16 lg:px-[140px] pb-0 gap-10 w-full overflow-hidden pointer-events-auto">
      
      <app-dashboard class="shrink-0 hidden lg:block mt-28"></app-dashboard>
      
      <div class="flex-1 w-full h-full flex flex-col overflow-hidden">
        
        <div class="text-black text-6xl font-bold font-['Poppins'] leading-[70.40px] mb-8 capitalize shrink-0">
          {{ tituloAtual$ | async }} 
        </div>

        <main class="flex-1 w-full bg-white rounded-2xl shadow-sm p-8 lg:p-12 overflow-y-auto">
          
          <div class="min-h-full border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center text-slate-400">
            Muito conteúdo aqui fará apenas esta caixa branca rolar para baixo.
          </div>
          
        </main>

      </div>

    </div>

    <div class="shrink-0 relative z-10 w-full pointer-events-auto">
      <app-footer></app-footer>
    </div>

  </div>
  
</div>
