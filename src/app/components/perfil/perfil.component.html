<div class="w-full h-screen overflow-hidden flex justify-center relative" (click)="(isEditingFirstName || isEditingLastName) && cancelEdit()">

  <app-template></app-template>

  <div class="relative w-full max-w-screen h-screen font-['Poppins'] flex flex-col">
    
    <header class="shrink-0 relative z-50 flex flex-row items-center justify-between w-full px-6 py-6 md:px-16 lg:px-[140px]">
      <app-header></app-header>
      <div class="flex items-center gap-4 pointer-events-auto">
        <app-user></app-user>
      </div>
    </header>

    <div class="relative z-10 flex-1 flex flex-col lg:flex-row items-start px-6 md:px-16 lg:px-[140px] pb-0 gap-10 w-full overflow-hidden pointer-events-auto">
      
      <app-dashboard class="shrink-0 hidden lg:block mt-28"></app-dashboard>
      
      <div class="flex-1 w-full h-full flex flex-col overflow-hidden">
        
        <div class="text-black text-6xl font-bold font-['Poppins'] leading-[70.40px] mb-8 capitalize shrink-0">
          {{ tituloAtual$ | async }} 
        </div>

        <main class="flex-1 w-full bg-white rounded-2xl shadow-sm p-8 lg:p-12 overflow-y-auto flex justify-center items-center">
          
          <div class="flex flex-col w-full gap-10">
            
            <div class="flex flex-col lg:flex-row gap-12 w-full items-start">
              
              <div class="flex flex-col items-center shrink-0 w-full lg:w-[250px] pt-2">
                <div class="relative w-36 h-36 shrink-0 group">
                  <img class="w-full h-full rounded-full object-cover shadow-sm transition-transform duration-300 group-hover:shadow-md" src="../../../assets/icons/Frame.svg" alt="Foto de Perfil" />
                  <button class="absolute bottom-0 right-0 w-12 h-12 flex items-center justify-center p-2 hover:scale-110 transition-transform cursor-pointer">
                    <img class="w-full h-full object-contain" src="../../../assets/icons/camera.png" alt="Editar" />
                  </button>
                </div>
              </div>

              <form class="flex-1 flex flex-col gap-6 w-full" #formPerfil="ngForm" >
                
                <div class="flex flex-col sm:flex-row gap-6 w-full">
                  
                  <div class="relative w-full sm:w-1/2 flex flex-col gap-1.5" (click)="$event.stopPropagation()">
                    <label class="text-sm pl-4 pointer-events-none transition-colors duration-300"
                           [ngClass]="isEditingFirstName ? 'text-sky-600 font-bold' : 'text-zinc-500 font-medium'">
                      Primeiro Nome
                    </label>
                    <input type="text" 
                           name="firstName"
                           [(ngModel)]="userData.firstName"
                           [readonly]="!isEditingFirstName"
                           [ngClass]="{
                             'border-sky-400 bg-sky-50 text-sky-800 font-semibold shadow-[0_0_10px_rgba(56,189,248,0.2)] focus:bg-white focus:border-sky-500': isEditingFirstName,
                             'border-zinc-500 bg-transparent text-sky-950': !isEditingFirstName
                           }"
                           class="w-full h-12 rounded-2xl border-2 px-4 pr-10 outline-none text-base font-['Poppins'] transition-all duration-300" />
                    
                    <img class="absolute right-4 bottom-3.5 w-5 h-5 cursor-pointer transition-all duration-300" 
                         [ngClass]="isEditingFirstName ? 'opacity-100 scale-110' : 'opacity-60 hover:opacity-100 hover:scale-110'"
                         src="../../../assets/icons/lapis.png" alt="Editar" 
                         (click)="toggleEditFirstName()"/>
                  </div>
                  
                  <div class="relative w-full sm:w-1/2 flex flex-col gap-1.5" (click)="$event.stopPropagation()">
                    <label class="text-sm pl-4 pointer-events-none transition-colors duration-300"
                           [ngClass]="isEditingLastName ? 'text-sky-600 font-bold' : 'text-zinc-500 font-medium'">
                      Último Nome
                    </label>
                    <input type="text" 
                           name="lastName"
                           [(ngModel)]="userData.lastName"
                           [readonly]="!isEditingLastName"
                           [ngClass]="{
                             'border-sky-400 bg-sky-50 text-sky-800 font-semibold shadow-[0_0_10px_rgba(56,189,248,0.2)] focus:bg-white focus:border-sky-500': isEditingLastName,
                             'border-zinc-500 bg-transparent text-sky-950': !isEditingLastName
                           }"
                           class="w-full h-12 rounded-2xl border-2 px-4 pr-10 outline-none text-base font-['Poppins'] transition-all duration-300" />
                    
                    <img class="absolute right-4 bottom-3.5 w-5 h-5 cursor-pointer transition-all duration-300" 
                         [ngClass]="isEditingLastName ? 'opacity-100 scale-110' : 'opacity-60 hover:opacity-100 hover:scale-110'"
                         src="../../../assets/icons/lapis.png" alt="Editar" 
                         (click)="toggleEditLastName()"/>
                  </div>

                </div>

                <div class="relative w-full flex flex-col gap-1.5">
                  <label class="text-zinc-500 text-sm font-medium pl-4 pointer-events-none">E-mail</label> 
                  <input type="email" 
                         name="email"
                         [(ngModel)]="userData.email"
                         readonly
                         class="w-full h-12 rounded-2xl border-2 border-slate-300 bg-slate-100 px-4 pr-10 focus:outline-none text-base text-slate-500 font-['Poppins'] cursor-not-allowed" />
                  <img class="absolute right-4 bottom-3.5 w-5 h-5 pointer-events-none opacity-40" src="../../../assets/imgs/envelope.png" alt="Ícone" />
                </div>

                <div class="relative w-full flex flex-col gap-1.5">
                  <label class="text-zinc-500 text-sm font-medium pl-4 pointer-events-none">Cargo</label> 
                  <input type="text" 
                         name="cargo"
                         [(ngModel)]="userData.cargo"
                         readonly
                         class="w-full h-12 rounded-2xl border-2 border-slate-300 bg-slate-100 px-4 pr-10 focus:outline-none text-base text-slate-500 font-['Poppins'] cursor-not-allowed" />
                  <img class="absolute right-4 bottom-3.5 w-5 h-5 pointer-events-none opacity-40" src="../../../assets/imgs/nome.png" alt="Ícone" />
                </div>

              </form>

            </div>

            <button type="button" 
                    (click)="$event.stopPropagation(); salvarAlteracoes()" 
                    [disabled]="isSaving"
                    class="w-full h-14 rounded-xl flex justify-center items-center transition-all shadow-sm mt-2"
                    [ngClass]="isSaving ? 'bg-sky-200 cursor-wait opacity-80' : 'bg-sky-300 hover:bg-sky-400 hover:scale-[1.02] cursor-pointer'">
              
              <svg *ngIf="isSaving" class="animate-spin -ml-1 mr-3 h-6 w-6 text-slate-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>

              <span class="text-slate-600 text-xl font-bold font-['Poppins']">
                {{ isSaving ? 'Salvando...' : 'Salvar alterações' }}
              </span>
            </button>

          </div>
          
        </main>

      </div>

    </div>

    <div class="shrink-0 relative z-10 w-full pointer-events-auto">
      <app-footer></app-footer>
    </div>

  </div>
  
  <div class="fixed top-32 right-20 z-[100] flex items-center gap-3 px-6 py-4 rounded-xl shadow-lg font-['Poppins'] font-medium text-white transition-all duration-500 transform pointer-events-none"
       [ngClass]="{
         'translate-x-0 opacity-100': showToast,
         'translate-x-[150%] opacity-0': !showToast,
         'bg-red-500': toastType === 'error',
         'bg-emerald-500': toastType === 'success'
       }">
    
    <svg *ngIf="toastType === 'success'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>

    <svg *ngIf="toastType === 'error'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>

    <span>{{ toastMessage }}</span>
  </div>

</div>
