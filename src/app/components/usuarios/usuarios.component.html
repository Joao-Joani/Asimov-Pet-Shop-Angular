<div class="w-full h-screen overflow-hidden flex justify-center relative">

  <app-template></app-template>

  <div class="relative w-full max-w-screen h-screen font-['Poppins'] flex flex-col">
    
    <header class="shrink-0 relative z-50 flex flex-row items-center justify-between w-full px-6 py-6 md:px-16 lg:px-[140px]">
      <app-header></app-header>
      <div class="flex items-center gap-4 pointer-events-auto">
        <app-user></app-user>
      </div>
    </header>

    <div class="relative z-10 flex-1 flex flex-col lg:flex-row items-start px-6 md:px-16 lg:px-[140px] pb-0 gap-10 w-full overflow-hidden pointer-events-auto">
      
      <app-dashboard class="shrink-0 hidden lg:block mt-28"></app-dashboard>
      
      <div class="flex-1 w-full h-full flex flex-col overflow-hidden">
        
        <div class="text-black text-6xl font-bold font-['Poppins'] leading-[70.40px] mb-8 capitalize shrink-0">
          {{ tituloAtual$ | async }} 
        </div>

        <main class="flex-1 w-full bg-white rounded-2xl shadow-sm p-8 lg:p-12 overflow-y-auto flex flex-col" (click)="editId && cancelEdit()">
          
          <div class="w-full flex justify-start mb-8">
            <div class="flex items-center w-full h-11 rounded-2xl border-2 border-zinc-500 px-4 gap-3 bg-white focus-within:border-sky-500 transition-colors">
              <input type="text" 
                     placeholder="Pesquisar usuários..." 
                     [(ngModel)]="searchTerm"
                     (ngModelChange)="filterUsers()"
                     class="flex-1 bg-transparent outline-none text-zinc-600 text-base md:text-lg font-medium font-['Poppins'] w-full h-full placeholder:text-zinc-400" />
              <img class="w-6 h-6 shrink-0 cursor-pointer" src="../../../assets/icons/lupa.png" alt="Lupa" />
            </div>
          </div>

          <div class="w-full flex-1 overflow-x-auto">
            <table class="w-full min-w-[800px] border-collapse table-fixed" (click)="$event.stopPropagation()">
              <thead>
                <tr class="bg-sky-300 text-black text-lg md:text-xl font-medium font-['Poppins']">
                  <th class="py-3 px-6 text-left rounded-l-2xl w-32">Crachá</th>
                  <th class="py-3 px-6 text-left w-1/4">Nome</th>
                  <th class="py-3 px-6 text-left w-1/3">E-mail</th>
                  <th class="py-3 px-6 text-left w-32">Cargo</th>
                  <th class="py-3 px-6 text-center rounded-r-2xl w-32">Ação</th>
                </tr >
              </thead>
              <tbody class="text-black text-base md:text-lg font-medium font-['Poppins']" >
                
                <tr *ngFor="let user of paginatedUsers" class="border-b border-black/20 hover:bg-slate-50 transition-colors">
                  <td class="py-4 px-6">
                    <input
                      #codInput
                      [value]="getCodFunc(user)"
                      (input)="setCodFunc(user, codInput.value)"
                      [disabled]="editId !== user.email"
                      [ngClass]="{
                        'bg-white shadow-md border border-sky-400': editId === user.email,
                        'bg-transparent border-none': editId !== user.email
                      }"
                      class="bg-transparent w-full outline-none"
                    >
                  </td>
                  
                  <td class="py-4 px-6">
                    <input
                      [(ngModel)]="user.nome"
                      [disabled]="editId !== user.email"
                      [ngClass]="{
                        'bg-white shadow-md border border-sky-400': editId === user.email,
                        'bg-transparent border-none': editId !== user.email
                      }"
                      class="bg-transparent w-full outline-none"
                    >
                  </td>
                  
                  <td class="py-4 px-6">
                    <input
                      [(ngModel)]="user.email"
                      disabled
                      class="bg-transparent w-full outline-none"
                    >
                  </td>

                  <td class="py-4 px-6">
                    <select
                      [(ngModel)]="user.perfil"
                      [disabled]="editId !== user.email"
                      [ngClass]="{
                        'bg-white shadow-md border border-sky-400': editId === user.email,
                        'bg-transparent border-none': editId !== user.email
                      }"
                      class="w-full outline-none px-2 py-1 rounded"
                    >
                      <option *ngFor="let p of perfis" [value]="p">{{p}}</option>
                    </select>
                  </td>

                  <td class="py-4 px-6">
                    <div class="flex items-center justify-center gap-4">
                      <button *ngIf="editId !== user.email" (click)="editUser(user)" class="hover:scale-110 transition-transform"><img class="w-6 h-6" src="../../../assets/icons/lapis.png" alt="Editar" /></button>
                      <button *ngIf="editId === user.email" (click)="salvar(user)">✔️</button>
                      <button class="hover:scale-110 transition-transform"><img class="w-6 h-6" src="../../../assets/icons/lixo.png" alt="Excluir" /></button>
                    </div>
                  </td>
                </tr>

                <tr *ngIf="filteredUsers.length === 0">
                  <td colspan="5" class="py-8 text-center text-zinc-500 font-medium">
                    Nenhum usuário encontrado {{ searchTerm ? 'para "' + searchTerm + '"' : '' }}.
                  </td>
                </tr>
                
              </tbody>
            </table>
          </div>

          <div class="w-full flex justify-end items-center mt-6 gap-6 pt-4">
            
            <span class="text-black text-lg font-bold font-['Poppins']">
              {{ currentPage }} - {{ totalPages }}
            </span>
            
            <div class="flex items-center gap-4">
              
              <button 
                [disabled]="currentPage === 1"
                (click)="prevPage()"
                class="flex items-center justify-center transition-all outline-none"
                [ngClass]="currentPage === 1 ? 'text-zinc-300 cursor-not-allowed' : 'text-black hover:scale-110 cursor-pointer'">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6 rotate-180">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                </svg>
              </button>

              <button 
                [disabled]="currentPage === totalPages || totalPages === 0"
                (click)="nextPage()"
                class="flex items-center justify-center transition-all outline-none"
                [ngClass]="(currentPage === totalPages || totalPages === 0) ? 'text-zinc-300 cursor-not-allowed' : 'text-black hover:scale-110 cursor-pointer'">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                </svg>
              </button>

            </div>
          </div>

        </main>

      </div>

    </div>

    <div class="shrink-0 relative z-10 w-full pointer-events-auto">
      <app-footer></app-footer>
    </div>

  </div>
  
</div>
