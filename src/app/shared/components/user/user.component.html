<div class="flex items-center gap-4 bg-white p-2 pr-5 rounded-xl shadow-sm w-fit max-w-[250px] md:max-w-[350px]">
  
  <img class="w-12 h-12 rounded-full object-cover shadow-sm shrink-0" src="../../../assets/icons/Frame.svg" alt="Foto do usuário" />
  
  <div class="flex items-center gap-3 min-w-0">
    
    <div class="text-black text-2xl md:text-3xl font-normal font-['Poppins'] leading-10 truncate" *ngIf="name" [title]="name">
      {{name}}
    </div>
    
    <div class="w-[2px] h-6 bg-gray-300 shrink-0 mt-1 rounded-full"></div>
    
    <a (click)="logout()" 
       routerLink="/" 
       class="text-red-600 hover:text-red-700 text-lg md:text-xl font-medium font-['Poppins'] cursor-pointer shrink-0 transition-colors mt-1">
      Sair
    </a>
    
  </div>
  
</div>
