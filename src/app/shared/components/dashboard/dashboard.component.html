<div class="text-black text-6xl font-bold font-['Poppins'] leading-[70.40px] mb-8 capitalize">
  {{ tituloAtual }}
</div>

<div class="w-64 h-fit bg-white rounded-2xl p-4 flex flex-col gap-2 shadow-sm">
  
  <ng-container *ngFor="let item of menuItems">
    <div 
      [routerLink]="item.rota" 
      routerLinkActive="bg-sky-300"
      class="w-full h-20 rounded-2xl flex items-center px-6 gap-4 cursor-pointer hover:bg-slate-200 hover:scale-[1.02] transition-all duration-300">
      
      <img class="w-12 h-12 object-contain" [src]="item.icone" [alt]="item.nome" />
      <span class="text-black text-3xl font-normal font-['Poppins'] leading-10">{{ item.nome }}</span>
      
    </div>
  </ng-container>

</div>
